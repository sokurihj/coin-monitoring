name: Whale Notifier

on:
  workflow_dispatch:        # Fly.io로 이전 후 수동 실행만 유지

concurrency:
  group: whale-notifier
  cancel-in-progress: false  # 이전 실행 완료 후 새 실행 시작

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run whale notifier (4분 50초)
        run: npx tsx scripts/whale-notifier.ts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          MAX_RUNTIME_MS: '290000'
