name: Whale Notifier

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행 (GitHub 지연 가능 — cron-job.org로 보완)
  workflow_dispatch:        # 수동 실행 + cron-job.org 트리거

concurrency:
  group: whale-notifier
  cancel-in-progress: false  # 이전 실행 완료 후 새 실행 시작

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run whale notifier (4분 30초)
        run: npx tsx scripts/whale-notifier.ts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_RUNTIME_MS: '270000'
