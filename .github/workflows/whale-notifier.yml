name: Whale Notifier

on:
  schedule:
    - cron: '*/5 * * * *'                              # 0,5,10... 분 실행
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'  # 2,7,12... 분 실행 (오프셋)
  workflow_dispatch:        # 수동 실행 + cron-job.org 트리거

concurrency:
  group: whale-notifier
  cancel-in-progress: false  # 이전 실행 완료 후 새 실행 시작

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run whale notifier (4분 50초)
        run: npx tsx scripts/whale-notifier.ts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          MAX_RUNTIME_MS: '290000'
